<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<title>To Do List</title>
	<link rel="stylesheet" href="./style.css">

</head>

<body>
	<!-- partial:index.partial.html -->
	<html>

	<head>
		<title>To Do</title>
		<link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
	</head>

	<body>
		<div id="container">
			<h1>To-Do List<i class="fa fa-plus"></i></h1>
			<div class="slide">
				<input type="text" placeholder="New Item">
			</div>


			<ul>
				<li><span><i class="fa fa-trash-o"></i></span>Add a To-Do</li>
				<li><span><i class="fa fa-trash-o"></i></span>Delete a To-Do</li>
				<li><span><i class="fa fa-trash-o"></i></span>Check off a To-Do</li>
			</ul>

			<button id="exportBtn" class="export-button">
				<i class="fa fa-table"></i> Export to Google Sheets
			</button>
			<a href="https://docs.google.com/spreadsheets/d/1bnPLt_4a4A9-GzO4MA8iREd_ay3UdLIBkr4a8wPwOXE/edit?gid=0#gid=0" target="_blank">Google Sheets</a>

		</div>

		<script type="text/javascript" src="assets/js/script.js"></script>
	</body>

	</html>
	<!-- partial -->
	<script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/3.1.1/jquery.min.js'></script>
	<script src="./script.js"></script>

	<script>
		document.getElementById('exportBtn').addEventListener('click', async () => {
			const btn = document.getElementById('exportBtn');
			btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Exporting...';
			btn.disabled = true;

			try {
				const response = await fetch('http://localhost:3000/export-tasks', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' }
				});

				if (response.ok) {
					alert('Tasks successfully sent to Google Sheets!');
				} else {
					const errorText = await response.text();
					alert('Export failed: ' + errorText);
				}
			} catch (err) {
				console.error(err);
				alert('Could not connect to the server. Did you run "node server.js"?');
			} finally {
				btn.innerHTML = '<i class="fa fa-table"></i> Export to Google Sheets';
				btn.disabled = false;
			}
		});
	</script>
</body>

</html>
